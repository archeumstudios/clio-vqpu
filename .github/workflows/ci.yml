name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets --locked
      - run: cargo run --release -p clio-bench -- --smoke --output-dir /tmp/clio-bench-smoke
      - run: test -s /tmp/clio-bench-smoke/raw/benchmark-results.csv
      - run: cargo run -p clio-replay -- pack examples/bell-state/main.clio /tmp/bell.replay.json
      - run: cargo run -p clio-replay -- verify /tmp/bell.replay.json
      - run: python3 research/benchmarks/scripts/evidence_integrity.py

  external-baseline:
    name: Qiskit differential baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r research/external/requirements.txt
      - run: cargo build -p clio-cli
      - run: python research/external/qiskit_compare.py
